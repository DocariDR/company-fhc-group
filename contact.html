            <div class="form-container">
                <h1>Contactez nous</h1>
                <form id="form" action="post" action="#">

                        <label for="lastName">Nom :</label>
                        <input id="lastName" type="text" name="lastName" placeholder="Entrer votre nom" required>
                    </div>
                    <div class="group-form">
                        <label for="firstName">Prénom :</label>
                        <input id="firstName" type="text" name="firstName" placeholder="Entrer votre prénom" required>
                    </div>
                    <button id="btn" type="submit">Envoyer</button>
                </form>
            </div>
        </section>
