<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Company</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header">
        <nav id="navbar">
            <a id="logo" href="./index.html">Company</a>

            <label id="nav-menu-btn">
                <input id="nav-btn-check" type="checkbox">
                <span class="nav-menu-icon">
                    <span></span><span></span><span></span>
                </span>
            </label>

            <ul id="nav-menu">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="a-propos.html">A propos</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main id="main-contact">
        <h1>Contactez nous</h1>
        <section class="section">
            <div class="form-container">
                <h2>Envoyez-nous un message</h2>
                <form id="form" action="post" action="#">
                    <div class="group-form">
                        <label for="lastName">Nom :</label>
                        <input class="field" id="lastName" type="text" name="lastName" placeholder="Entrer votre nom" required>
                    </div>
                    <div class="group-form">
                        <label for="firstName">Prénom :</label>
                        <input class="field" id="firstName" type="text" name="firstName" placeholder="Entrer votre prénom" required>
                    </div>
                    <div class="group-form">
                        <label for="email">Email :</label>
                        <input class="field" id="email" type="email" name="email" placeholder="bob@exemple.com" required>
                    </div>
                    <div class="group-form">
                        <label for="subject">Sujet :</label>
                        <select class="field" name="subject" id="subject">
                            <option value="qg">Question générale</option>
                            <option value="cp">Commande professionnelle</option>
                            <option value="f">Formation</option>
                            <option value="a">Ateliers</option>
                        </select>
                    </div>
                    <div class="group-form">
                        <label for="subject">Message :</label>
                        <textarea class="msg-field" name="msg" id="message"></textarea>
                    </div>
                    <button id="btn" type="submit">Envoyer</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        &copy; 2026 Copyright - Company
    </footer>
</body>
</html>
